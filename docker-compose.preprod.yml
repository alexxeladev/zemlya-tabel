# Препрод-стек zemlya-tabel: Postgres + backend (uvicorn) + web (nginx: статика + прокси /api).
# Все переменные берутся из .env.preprod (скрипты передают его через --env-file).
# Поднимать/обновлять только через ./install.sh и ./deploy.sh — там миграции и создание админа.
name: zemlya-tabel-preprod

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - tabel-preprod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    # Порт БД на хост НЕ пробрасываем (доступ только из compose-сети).

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env.preprod
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
    # Порт backend на хост НЕ пробрасываем — ходят через web (nginx-прокси).

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PREPROD_HTTP_PORT:-8080}:80"

volumes:
  tabel-preprod-data:
